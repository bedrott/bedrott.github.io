<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedrott</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <main class="content-wrapper">
    <section class="custom-hero">
      <div class="profile-container">
        <div class="profile-avatar-wrapper">
          <img src="avatar.gif" alt="Bedrott Perfil" class="profile-pic" />
        </div>
        <div class="profile-text-content">
          <div class="profile-header-row">
            <h1 class="profile-display-name">Bedrott</h1>
            <span class="profile-handle">@bedrott404</span>
          </div>
          <div class="profile-stats">
            <div><strong>42.7K</strong> <span>Seguidores</span></div>
            <div><strong>2.6M</strong> <span>Curtidas</span></div>
          </div>
          <p class="profile-bio">Apenas um jovem larper compilando ideias no quarto.</p>
        </div>
      </div>
    </section>

    <div class="terminal-container">
      <div class="terminal-header">
        <div class="dot-window"></div>
        <div class="dot-window"></div>
        <div class="dot-window"></div>
      </div>
      <div id="terminal-output"></div>
    </div>

    <footer class="footer">
      <div>&copy; 2026 Bedrott. Todos os direitos reservados.</div>
    </footer>
  </main>

  <audio id="bg-music" src="musica.mp3" loop></audio>

  <script>
    const output = document.getElementById('terminal-output');
    const audio = document.getElementById('bg-music');
    const color = "#f67c7c"; 

    // Prefixo padronizado
    const getPrefix = () => `<span style="color:${color};">bedrott</span><span style="color:#ffffff;">@</span><span style="color:${color};">terminal</span><span style="color:${color};">:~$</span>`;

    function getUptime() {
      const nasci = new Date(2007, 11, 3);
      const hoje = new Date();
      let anos = hoje.getFullYear() - nasci.getFullYear();
      let meses = hoje.getMonth() - nasci.getMonth();
      let dias = hoje.getDate() - nasci.getDate();
      if (dias < 0) { meses--; dias += new Date(hoje.getFullYear(), hoje.getMonth(), 0).getDate(); }
      if (meses < 0) { anos--; meses += 12; }
      return `${anos} anos, ${meses} meses e ${dias} dias`;
    }

    function runFastfetch() {
      const div = document.createElement('div');
      div.innerHTML = `
        <div style="display: flex; gap: 20px; font-family: 'Space Mono', monospace; margin: 10px 0; color: #ffffff;">

          </div>
          <div>
            <p>${getPrefix()}</p>
            <div style="border-top: 1px solid ${color}; margin: 5px 0; width: 200px;"></div>
            <p style="margin-bottom:1px;"><span style="color:${color};">Nome:</span> Cristiano Wichineski (Bedrott)</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Uptime:</span> ${getUptime()}</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Cor Favorita:</span> Preto</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Artista Favorito:</span> Otuka</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Música Favorita:</span> Skin - Otuka</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Anime Favorito:</span> Darling in the Franxx</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Local:</span> Curitiba, PR</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Foco:</span> Otimizar Tudo</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Habilidades:</span> Fazer Edits e Larpar na programação</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">Status:</span> Codando...</p>
            <p style="margin-bottom:1px;"><span style="color:${color};">OS:</span> BedrottOS v1.0</p>
          </div>
        </div>`;
      output.appendChild(div);
    }

    function createPrompt() {
      const promptDiv = document.createElement('div');
      promptDiv.className = 'input-line';
      promptDiv.innerHTML = `${getPrefix()}<input type="text" autofocus style="background:transparent; border:none; color:#ffffff; width:80%; margin-left:10px; outline:none; font-family:'Space Mono', monospace;">`;
      output.appendChild(promptDiv);

      const input = promptDiv.querySelector('input');
      input.focus();

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const cmd = input.value.toLowerCase().trim();

          // 1. Apenas substitui o input atual pelo texto fixo do comando digitado
          // Isso evita criar um novo elemento <p> que duplica o prompt
          promptDiv.innerHTML = `${getPrefix()} ${input.value}`;

          // 2. Cria um novo container para a resposta (para não misturar com o prompt)
          const responseDiv = document.createElement('div');
          
          if (cmd === 'help') { responseDiv.innerHTML = `<p style="margin:0;">Comandos: whoami, clear, music, fastfetch</p>`; }
          else if (cmd === 'whoami') { responseDiv.innerHTML = `<p style="margin:0;">Jovem larper, entusiasta de sistemas e otimização.</p>`; }
          else if (cmd === 'clear') { output.innerHTML = ''; return createPrompt(); }
          else if (cmd === 'music') { audio.paused ? audio.play() : audio.pause(); responseDiv.innerHTML = `<p style="margin:0;">Sistema: Música ${audio.paused ? 'pausada' : 'iniciada'}.</p>`; }
          else if (cmd === 'fastfetch') { 
              runFastfetch(); 
              return createPrompt(); // Retorna direto para não criar div de resposta vazia
          }
          else if (cmd !== '') { responseDiv.innerHTML = `<p style="margin:0;">Comando '${cmd}' não encontrado.</p>`; }
          
          output.appendChild(responseDiv);
          
          // 3. Cria o novo prompt limpo para a próxima linha
          createPrompt();
          output.scrollTop = output.scrollHeight;
        }
      });
    }

    // Inicialização
    output.innerHTML = ""; // Limpa tudo antes de começar
    runFastfetch(); // Primeiro ele abre o fastfetch
    output.innerHTML += `<p>Bem-vindo ao sistema Bedrott v1.0. Digite "help" para ver os comandos.</p>`; // Depois a mensagem
    createPrompt(); // Por fim, cria o prompt para digitar
  </script>
</body>
</html>
