<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedrott</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <section class="custom-hero">
    <div class="profile-container">
      <div class="profile-avatar-wrapper">
        <img src="avatar.gif" alt="Bedrott Perfil" class="profile-pic" />
      </div>
      <div class="profile-text-content">
        <div class="profile-header-row">
          <h1 class="profile-display-name">Bedrott</h1>
          <span class="profile-handle">@bedrott404</span>
        </div>
        <div class="profile-stats">
          <div><strong>42.7K</strong> <span>Seguidores</span></div>
          <div><strong>2.6M</strong> <span>Curtidas</span></div>
        </div>
        <p class="profile-bio">Apenas um jovem larper compilando ideias no quarto.</p>
      </div>
    </div>
  </section>

  <div class="terminal-container">
    <div class="terminal-header">
      <div class="dot-window"></div>
      <div class="dot-window"></div>
      <div class="dot-window"></div>
    </div>
    <div id="terminal-output"></div>
  </div>

  <footer class="footer">
    <div>&copy; 2026 Bedrott. Todos os direitos reservados.</div>
  </footer>

  <audio id="bg-music" src="musica.mp3" loop></audio>

  <script>
    const output = document.getElementById('terminal-output');
    const audio = document.getElementById('bg-music');

    // Função que calcula a idade real
    function getUptime() {
      const nasci = new Date(2007, 11, 3);
      const hoje = new Date();
      let anos = hoje.getFullYear() - nasci.getFullYear();
      let meses = hoje.getMonth() - nasci.getMonth();
      let dias = hoje.getDate() - nasci.getDate();
      if (dias < 0) { meses--; dias += new Date(hoje.getFullYear(), hoje.getMonth(), 0).getDate(); }
      if (meses < 0) { anos--; meses += 12; }
      return `${anos} anos, ${meses} meses e ${dias} dias`;
    }

      output.innerHTML += `

          <div>
            <p>
              <span style="color: #55ff55;">bedrott</span><span style="color: #ffffff;">@</span><span style="color: #55ff55;">terminal</span>
            </p>
            <div style="border-top: 1px solid #55ff55; margin: 5px 0; width: 200px;"></div>
            
            <p><span style="color: #55ff55;">Nome:</span> Cristiano Wichineski (Bedrott)</p>
            <p><span style="color: #55ff55;">Uptime:</span> ${getUptime()}</p>
            <p><span style="color: #55ff55;">Cor Favorita:</span> Preto</p>
            <p><span style="color: #55ff55;">Artista Favorito:</span> Otuka</p>
            <p><span style="color: #55ff55;">Música Favorita:</span> Skin - Otuka</p>
            <p><span style="color: #55ff55;">Anime Favorito:</span> Darling in the Franxx</p>
            <p><span style="color: #55ff55;">Local:</span> Curitiba, PR</p>
            <p><span style="color: #55ff55;">Foco:</span> Otimizar Tudo</p>
            <p><span style="color: #55ff55;">Habilidades:</span> Fazer Edits e Larpar na programação</p>
            <p><span style="color: #55ff55;">Status:</span> Codando...</p>
            <p><span style="color: #55ff55;">OS:</span> BedrottOS v1.0</p>
          </div>
        </div>
      `;
    }

    function createPrompt() {
      const promptDiv = document.createElement('div');
      promptDiv.className = 'input-line';
      promptDiv.innerHTML = `
        <span class="prompt" style="font-family: 'Space Mono', monospace;">
            <span style="color: #55ff55;">bedrott</span><span style="color: #ffffff;">@</span><span style="color: #55ff55;">terminal</span><span style="color: #55ff55;">:~$</span>
        </span>
        <input type="text" id="terminal-input" autofocus autocomplete="off" style="background: transparent; border: none; color: white; width: 80%; margin-left: 10px; outline: none; font-family: 'Space Mono', monospace;">
      `;
      output.appendChild(promptDiv);
      const input = promptDiv.querySelector('input');
      input.focus();
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const cmd = input.value.toLowerCase().trim();
          const commandLine = document.createElement('p');
          commandLine.innerHTML = `<span style="color: #55ff55;">bedrott</span><span style="color: #ffffff;">@</span><span style="color: #55ff55;">terminal</span><span style="color: #55ff55;">:~$</span> ${input.value}`;
          output.insertBefore(commandLine, promptDiv);
          input.disabled = true;
          if (cmd === 'help') { output.innerHTML += `<p>Comandos: whoami, clear, music, fastfetch</p>`; }
          else if (cmd === 'whoami') { output.innerHTML += `<p>Jovem larper, entusiasta de sistemas e otimização.</p>`; }
          else if (cmd === 'clear') { output.innerHTML = ''; }
          else if (cmd === 'music') { audio.paused ? audio.play() : audio.pause(); output.innerHTML += `<p>Sistema: Música ${audio.paused ? 'pausada' : 'iniciada'}.</p>`; }
          else if (cmd === 'fastfetch') { runFastfetch(); }
          else if (cmd !== '') { output.innerHTML += `<p>Comando '${cmd}' não encontrado.</p>`; }
          promptDiv.remove();
          createPrompt();
          output.scrollTop = output.scrollHeight;
        }
      });
    }

    runFastfetch();
    output.innerHTML += `<p>Bem-vindo ao sistema Bedrott v1.0. Digite "help" para ver os comandos.</p>`;
    createPrompt();
  </script>
</body>
</html>
